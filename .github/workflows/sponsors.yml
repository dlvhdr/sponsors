name: sponsors

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sponsors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npx @goreleaser/sponsors generate --config sponsors.yml sponsors-for-readme.json
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
      - run: npx @goreleaser/sponsors apply sponsors-for-readme.json readme.tpl.md README.md
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update sponsors"
